<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Weather Prediction System</title>

    <style>

        body{
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
        }

        .container{
            width: 420px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.2);
        }

        h1{
            text-align: center;
            color: #333;
            margin-bottom: 25px;
        }

        input, select{

            width: 100%;
            padding: 12px;
            margin-top: 10px;
            margin-bottom: 20px;

            border: 1px solid #ccc;
            border-radius: 8px;

            font-size: 15px;

            box-sizing: border-box;
        }

        button{

            width: 100%;
            padding: 12px;

            background: linear-gradient(to right, #007bff, #00c6ff);

            color: white;
            border: none;
            border-radius: 8px;

            font-size: 16px;
            cursor: pointer;

            transition: 0.3s;
        }

        button:hover{
            transform: scale(1.03);
        }

        .result{

            margin-top: 20px;
            padding: 15px;

            text-align: center;

            font-size: 22px;
            font-weight: bold;

            color: green;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>Weather Prediction</h1>

        <form action="/predict" method="POST">

            <input type="number"
                   step="0.1"
                   name="temperature"
                   placeholder="Temperature (15°C - 45°C)"
                   min="15"
                   max="45"
                   required>

            <input type="number"
                   step="0.1"
                   name="humidity"
                   placeholder="Humidity (20% - 100%)"
                   min="20"
                   max="100"
                   required>

            <input type="number"
                   step="0.1"
                   name="pressure"
                   placeholder="Pressure (980 - 1050)"
                   min="980"
                   max="1050"
                   required>

            <input type="number"
                   step="0.1"
                   name="wind_speed"
                   placeholder="Wind Speed (0 - 25)"
                   min="0"
                   max="25"
                   required>

            <input type="number"
                   step="0.1"
                   name="rainfall"
                   placeholder="Rainfall (0 - 200)"
                   min="0"
                   max="200"
                   required>

            <select name="city" required>

                <option value="">Select City</option>

                <option>Nagpur</option>
                <option>Mumbai</option>
                <option>Pune</option>
                <option>Delhi</option>
                <option>Bangalore</option>
                <option>Chennai</option>
                <option>Hyderabad</option>
                <option>Kolkata</option>
                <option>Jaipur</option>
                <option>Ahmedabad</option>

            </select>

            <button type="submit">
                Predict Weather
            </button>

        </form>

        <div class="result">
            {{ prediction_text }}
        </div>

    </div>

</body>

</html>
